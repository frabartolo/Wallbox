esphome:
  name: wallbox
  friendly_name: Wallbox
  platformio_options:
    lib_deps:
      - "Wire"
      - "SPI"
      - "Adafruit BusIO"
      - "adafruit/Adafruit DS3502@^1.0.3"

external_components:
  - source:
      type: local
      path: components
    components: [ds3502_potentiometer]

esp8266:
  board: d1_mini_lite

substitutions:
  default_charge_amps: "12"
  wallbox_phases: "3"
  wallbox_u_phase_v: "230"
  # Slider kW (3×230 V, max 32 A ≈ 22,08 kW); Mindeststrom 6 A ≈ 4,14 kW – UI-Min 6 kW gewünscht
  wallbox_min_slider_kw: "6.0"
  wallbox_max_slider_kw: "22.08"
  wallbox_max_amps_hard: "32"
  ha_shelly_scheinleistung_entity: "sensor.shellypro3em_2cbcbba674c0_total_apparent_power"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2
  ap:
    ssid: "Wallbox Fallback Hotspot"
    password: !secret fallback_ap_password

logger:
  level: INFO

ota:
  platform: esphome
  password: !secret ota_password

# Version 3: Reihenfolge über sorting_weight (Modus → Ist → Soll kW → Max → A → Shelly Roh).
# Bei Speicherproblemen auf dem D1: version: 1 (ohne sorting_weight-Zeilen unter den Entitäten).
web_server:
  port: 80
  version: 3

api:
  encryption:
    key: !secret api_encryption
  services:
    - service: set_charging_amps
      variables:
        amps: int
      then:
        - number.set:
            id: charging_amps_override
            value: !lambda "return amps;"
        - component.update: charging_power_kw
    - service: set_charging_amps_auto
      variables:
        amps: int
      then:
        - lambda: |-
            if (id(wallbox_mode) != 0) return;
            int a = (int) amps;
            if (a == 0) {
              id(current_amps_setting) = 0;
              id(ds3502_output).set_level(0.0f);
            } else {
              if (a < 6) a = 6;
              if (a > 64) a = 64;
              id(current_amps_setting) = a;
              id(ds3502_output).set_level((float) a / 64.0f);
            }
        - component.update: charging_amps_override
        - component.update: ds3502_current_amps_sensor
        - component.update: charging_power_kw
        - component.update: wallbox_lade_kw

i2c:
  id: bus_a
  sda: D1
  scl: D2
  scan: true

ds3502_potentiometer:
  id: my_ds3502
  i2c_id: bus_a
  address: 0x28

# wallbox_mode: 0=Automatik, 1=Maximal, 2=Legacy Überschuss (wird wie Automatik angezeigt), 3=Manuell
globals:
  - id: wallbox_mode
    type: int
    restore_value: false
    initial_value: "0"
  - id: current_amps_setting
    type: int
    restore_value: false
    initial_value: "12"

select:
  - platform: template
    name: "Modus"
    id: wallbox_modus_select
    optimistic: false
    update_interval: 1s
    web_server:
      sorting_weight: 10
    options:
      - "Automatik (nur Überschussladen)"
      - "Manuelles Laden (Einstellungen)"
      - "Maximal Laden jetzt"
    lambda: |-
      switch (id(wallbox_mode)) {
        case 0:
          return std::string("Automatik (nur Überschussladen)");
        case 1:
          return std::string("Maximal Laden jetzt");
        case 2:
          return std::string("Automatik (nur Überschussladen)");
        case 3:
          return std::string("Manuelles Laden (Einstellungen)");
        default:
          return std::string("Automatik (nur Überschussladen)");
      }
    set_action:
      - lambda: |-
          std::string opt = x;
          if (opt == "Automatik (nur Überschussladen)") {
            id(wallbox_mode) = 0;
          } else if (opt == "Manuelles Laden (Einstellungen)") {
            id(wallbox_mode) = 3;
          } else if (opt == "Maximal Laden jetzt") {
            id(wallbox_mode) = 1;
            id(current_amps_setting) = int(${wallbox_max_amps_hard});
            id(ds3502_output).set_level((float) id(current_amps_setting) / 64.0f);
          }
      - component.update: charging_amps_override
      - component.update: ds3502_current_amps_sensor
      - component.update: charging_power_kw
      - component.update: wallbox_lade_kw

number:
  # Hauptregler kW: in Automatik nur Anzeige (Eingriff wird verworfen und zurückgesetzt)
  - platform: template
    name: "Eingestellte Ladeleistung kW"
    id: charging_power_kw
    min_value: ${wallbox_min_slider_kw}
    max_value: ${wallbox_max_slider_kw}
    step: 0.1
    unit_of_measurement: "kW"
    web_server:
      sorting_weight: 30
    lambda: |-
      return (float) id(current_amps_setting) * float(${wallbox_u_phase_v}) * float(${wallbox_phases}) / 1000.0f;
    set_action:
      - lambda: |-
          const float u = float(${wallbox_u_phase_v});
          const float ph = float(${wallbox_phases});
          const float max_kw = float(${wallbox_max_slider_kw});
          if (id(wallbox_mode) != 3) {
            id(charging_power_kw).publish_state((float) id(current_amps_setting) * u * ph / 1000.0f);
            return;
          }
          float kw = x;
          if (kw < float(${wallbox_min_slider_kw}))
            kw = float(${wallbox_min_slider_kw});
          if (kw > max_kw)
            kw = max_kw;
          int amps = (int) lroundf(kw * 1000.0f / (u * ph));
          if (amps < 6)
            amps = 6;
          if (amps > int(${wallbox_max_amps_hard}))
            amps = int(${wallbox_max_amps_hard});
          id(current_amps_setting) = amps;
          id(wallbox_mode) = 3;
          id(ds3502_output).set_level((float) amps / 64.0f);
      - component.update: charging_amps_override
      - component.update: ds3502_current_amps_sensor
      - component.update: charging_power_kw
      - component.update: wallbox_lade_kw

  # Nur für esphome.set_charging_amps / API; nicht in der Web-Tabelle (internal)
  - platform: template
    name: "Soll-Ladestrom A (intern)"
    id: charging_amps_override
    internal: true
    min_value: 0
    max_value: 64
    step: 1
    unit_of_measurement: "A"
    lambda: |-
      return (float) id(current_amps_setting);
    set_action:
      - lambda: |-
          int amps = (int) x;
          if (amps != 0 && amps < 6) amps = 6;
          id(current_amps_setting) = amps;
          id(wallbox_mode) = 3;
          id(ds3502_output).set_level((float) amps / 64.0f);
      - component.update: charging_amps_override
      - component.update: ds3502_current_amps_sensor
      - component.update: charging_power_kw
      - component.update: wallbox_lade_kw

output:
  - platform: template
    id: ds3502_output
    type: float
    write_action:
      - lambda: |-
          int wiper_val = (int) (state * 127.0f);
          if (wiper_val < 0) wiper_val = 0;
          if (wiper_val > 127) wiper_val = 127;

          if (id(my_ds3502) != nullptr && id(my_ds3502)->set_wiper(wiper_val)) {
            ESP_LOGI("ds3502", "Wiper set successfully to %d", wiper_val);
          } else {
            ESP_LOGE("ds3502", "Failed to set wiper value");
          }

sensor:
  - platform: homeassistant
    name: "Wallbox Ladeleistung"
    id: wallbox_power_shelly
    entity_id: ${ha_shelly_scheinleistung_entity}
    accuracy_decimals: 0

  - platform: template
    name: "Aktuelle Ladeleistung kW"
    id: wallbox_lade_kw
    unit_of_measurement: "kW"
    device_class: power
    accuracy_decimals: 2
    update_interval: 1s
    web_server:
      sorting_weight: 20
    lambda: |-
      float s = id(wallbox_power_shelly).state;
      if (isnan(s)) return 0.0f;
      return s / 1000.0f;

  - platform: template
    name: "Maximal Laden"
    id: max_charge_kw_display
    unit_of_measurement: "kW"
    device_class: power
    accuracy_decimals: 2
    web_server:
      sorting_weight: 40
    lambda: |-
      return float(${wallbox_max_slider_kw});

  - platform: template
    name: "Wallbox Ladestrom"
    id: ds3502_current_amps_sensor
    unit_of_measurement: "A"
    accuracy_decimals: 0
    web_server:
      sorting_weight: 50
    lambda: |-
      return (float) id(current_amps_setting);

time:
  - platform: sntp
    id: sntp_time
