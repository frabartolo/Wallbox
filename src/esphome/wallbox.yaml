esphome:
  name: wallbox
  friendly_name: Wallbox
  platformio_options:
    lib_deps:
      - "Wire"
      - "SPI"
      - "Adafruit BusIO"
      - "adafruit/Adafruit DS3502@^1.0.3"

external_components:
  - source:
      type: local
      path: components
    components: [ds3502_potentiometer]

esp8266:
  board: d1_mini_lite

substitutions:
  default_charge_amps: "12"
  # 3×230 V (Außenleiter): P ≈ 3 · U_phase · I (vereinfacht). Nur für Anzeige kW / Web-UI.
  wallbox_phases: "3"
  wallbox_u_phase_v: "230"
  # Shelly Pro 3EM: Anzeige bewusst über Scheinleistung (S); passt hier besser zur erwarteten Ladegröße
  # als reine Wirkleistung (P) – beides in HA prüfbar. Entity-ID ggf. anpassen.
  ha_shelly_scheinleistung_entity: "sensor.shellypro3em_2cbcbba674c0_total_apparent_power"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # Schwächstes akzeptiertes WLAN; bei altem Router ggf. WPA
  min_auth_mode: WPA2
  ap:
    ssid: "Wallbox Fallback Hotspot"
    password: !secret fallback_ap_password

logger:
  level: INFO

ota:
  platform: esphome
  password: !secret ota_password

# Lokale Web-Oberfläche (Status, Entitäten, Steuerung im Browser im LAN)
web_server:
  port: 80

api:
  encryption:
    key: !secret api_encryption
  services:
    # Manuell / Home Assistant „hart“ setzen → Modus 3 (Override)
    - service: set_charging_amps
      variables:
        amps: int
      then:
        - number.set:
            id: charging_amps_override
            value: !lambda "return amps;"
        - component.update: wallbox_soll_kw
    # Nur im Modus Automatik (0): Strom von HA übernehmen, Modus unverändert
    - service: set_charging_amps_auto
      variables:
        amps: int
      then:
        - lambda: |-
            if (id(wallbox_mode) != 0) return;
            int a = (int) amps;
            if (a == 0) {
              id(current_amps_setting) = 0;
              id(ds3502_output).set_level(0.0f);
            } else {
              if (a < 6) a = 6;
              if (a > 64) a = 64;
              id(current_amps_setting) = a;
              id(ds3502_output).set_level((float) a / 64.0f);
            }
        - component.update: charging_amps_override
        - component.update: ds3502_current_amps_sensor
        - component.update: wallbox_soll_kw
        - component.update: wallbox_lade_kw

i2c:
  id: bus_a
  sda: D1
  scl: D2
  scan: true

ds3502_potentiometer:
  id: my_ds3502
  i2c_id: bus_a
  address: 0x28

# wallbox_mode: 0=Automatik (Regelung durch HA), 1=Maximal, 2=Nur Überschuss (Default-Strom), 3=Manuell
globals:
  - id: wallbox_mode
    type: int
    restore_value: false
    initial_value: "0"
  - id: current_amps_setting
    type: int
    restore_value: false
    initial_value: "12"

number:
  # Zeigt immer den eingestellten Soll-Ladestrom (A); Schieben = manuell (Modus 3)
  - platform: template
    name: "Wallbox Soll-Ladestrom"
    id: charging_amps_override
    min_value: 0
    max_value: 64
    step: 1
    unit_of_measurement: "A"
    lambda: |-
      return (float) id(current_amps_setting);
    set_action:
      - lambda: |-
          int amps = (int) x;
          if (amps != 0 && amps < 6) amps = 6;
          id(current_amps_setting) = amps;
          id(wallbox_mode) = 3;
          id(ds3502_output).set_level((float) amps / 64.0f);
      - component.update: charging_amps_override
      - component.update: ds3502_current_amps_sensor
      - component.update: wallbox_soll_kw

output:
  - platform: template
    id: ds3502_output
    type: float
    write_action:
      - lambda: |-
          int wiper_val = (int) (state * 127.0f);
          if (wiper_val < 0) wiper_val = 0;
          if (wiper_val > 127) wiper_val = 127;

          if (id(my_ds3502) != nullptr && id(my_ds3502)->set_wiper(wiper_val)) {
            ESP_LOGI("ds3502", "Wiper set successfully to %d", wiper_val);
          } else {
            ESP_LOGE("ds3502", "Failed to set wiper value");
          }

sensor:
  # Tatsächlich eingestellter Ladestrom (entspricht Soll am Poti / EVSE-Vorgabe)
  - platform: template
    name: "Wallbox Ladestrom"
    id: ds3502_current_amps_sensor
    unit_of_measurement: "A"
    accuracy_decimals: 0
    lambda: |-
      return (float) id(current_amps_setting);

  # Messwert aus Home Assistant (Shelly Pro 3EM Scheinleistung am Wallbox-Anschluss)
  - platform: homeassistant
    name: "Wallbox Ladeleistung"
    id: wallbox_power_shelly
    entity_id: ${ha_shelly_scheinleistung_entity}
    accuracy_decimals: 0

  - platform: template
    name: "Wallbox Modus"
    id: wallbox_mode_sensor
    accuracy_decimals: 0
    lambda: |-
      return id(wallbox_mode);

  # Anzeige kW (3×230 V): I · 3 · U / 1000
  - platform: template
    name: "Sollleistung kW"
    id: wallbox_soll_kw
    unit_of_measurement: "kW"
    accuracy_decimals: 2
    update_interval: 1s
    lambda: |-
      return (float) id(current_amps_setting) * float(${wallbox_u_phase_v}) * float(${wallbox_phases}) / 1000.0f;

  - platform: template
    name: "Ladeleistung kW"
    id: wallbox_lade_kw
    unit_of_measurement: "kW"
    accuracy_decimals: 2
    update_interval: 1s
    lambda: |-
      float s = id(wallbox_power_shelly).state;
      if (isnan(s)) return 0.0f;
      return s / 1000.0f;

# Lesbare Modus-Anzeige + drei „aktiv“-Indikatoren (Web-UI: Buttons haben keinen Zustand)
text_sensor:
  - platform: template
    name: "Betriebsart"
    id: wallbox_betriebsart_text
    update_interval: 1s
    lambda: |-
      switch (id(wallbox_mode)) {
        case 0:
          return std::string("Automatik (Regelung Home Assistant)");
        case 1:
          return std::string("Maximal laden");
        case 2:
          return std::string("Nur Überschussladen");
        case 3:
          return std::string("Manuell (Soll-Ladestrom)");
        default:
          return std::string("?");
      }

binary_sensor:
  # Lambda wird in loop() laufend ausgewertet (kein PollingComponent → kein component.update)
  - platform: template
    name: "Status Automatikmodus"
    id: status_mode_auto
    device_class: running
    lambda: |-
      return id(wallbox_mode) == 0;
  - platform: template
    name: "Status Maximal laden"
    id: status_mode_max
    device_class: running
    lambda: |-
      return id(wallbox_mode) == 1;
  - platform: template
    name: "Status Nur Überschussladen"
    id: status_mode_surplus
    device_class: running
    lambda: |-
      return id(wallbox_mode) == 2;

button:
  - platform: template
    name: "Maximal Laden jetzt"
    id: charge_max_button
    on_press:
      - lambda: |-
          id(wallbox_mode) = 1;
          id(current_amps_setting) = 32;
          id(ds3502_output).set_level((float) id(current_amps_setting) / 64.0f);
      - component.update: charging_amps_override
      - component.update: ds3502_current_amps_sensor
      - component.update: wallbox_soll_kw

  - platform: template
    name: "Nur Überschussladen"
    id: charge_surplus_button
    on_press:
      - lambda: |-
          id(wallbox_mode) = 2;
          id(current_amps_setting) = ${default_charge_amps};
          id(ds3502_output).set_level((float) id(current_amps_setting) / 64.0f);
      - component.update: charging_amps_override
      - component.update: ds3502_current_amps_sensor
      - component.update: wallbox_soll_kw

  - platform: template
    name: "Automatikmodus"
    on_press:
      - lambda: |-
          id(wallbox_mode) = 0;
      - component.update: wallbox_mode_sensor
      - component.update: charging_amps_override
      - component.update: ds3502_current_amps_sensor

time:
  - platform: sntp
    id: sntp_time
