# Wallbox: PV / Netz → Ladeleistung (W) → Zielstrom (A) → ESPHome set_charging_amps_auto
#
# Regelung: sensor.verbrauch_aktuell (16.7.0) soll gegen 0 laufen. Stellgröße ist die Ladeleistung.
# Soll-Ladeleistung (W): max(0, min(P_max, P_Lade_Schein - w)) mit w = Verbrauch aktuell,
# P_Lade = sensor.wallbox_wallbox_ladeleistung (Shelly/ESPHome), P_max = max_A * U * Phasen.
# Daraus Zielstrom (A); < 6 A → 0 A an den ESP.
# Anzeigen: Leistung automatisch W (<1000) oder kW (|P|≥1000), siehe Template unit_of_measurement.

input_number:
  wallbox_min_amps:
    name: Wallbox Mindeststrom
    min: 6
    max: 16
    step: 1
    unit_of_measurement: A
    icon: mdi:current-dc
    initial: 6
  wallbox_max_amps:
    name: Wallbox Maximalstrom
    min: 6
    max: 64
    step: 1
    unit_of_measurement: A
    icon: mdi:current-dc
    initial: 32
  wallbox_spannung_effektiv:
    name: Wallbox Spannung pro Phase
    min: 200
    max: 250
    step: 1
    unit_of_measurement: V
    initial: 230

input_select:
  wallbox_anschluss:
    name: Wallbox Anschluss
    icon: mdi:transmission-tower
    options:
      - "1x230V"
      - "3x230V"
    initial: "1x230V"

input_boolean:
  wallbox_pv_regelung:
    name: Wallbox PV-Überschussregelung
    icon: mdi:solar-power
    initial: true

sensor:
  - platform: derivative
    source: sensor.zaehler_lieferung_wh
    name: Wallbox Lieferung Leistung
    unique_id: wallbox_lieferung_ableitung_w
    unit_time: h
    round: 0

template:
  - sensor:
      # Soll-Ladeleistung (W) zur Netzführung auf 0: P_soll = clamp(P_ist - w, 0, P_max)
      - name: "Wallbox PV Rohleistung"
        unique_id: wallbox_pv_rohleistung
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        state: >
          {% set w = states('sensor.verbrauch_aktuell') | float(0) %}
          {% set pwb = states('sensor.wallbox_wallbox_ladeleistung') | float(0) %}
          {% set u = states('input_number.wallbox_spannung_effektiv') | float(230) %}
          {% set ph = 3 if is_state('input_select.wallbox_anschluss','3x230V') else 1 %}
          {% set mx = states('input_number.wallbox_max_amps') | int(32) %}
          {% set p_cap = mx * u * ph %}
          {{ max(0, min(p_cap, pwb - w)) }}

      - name: "Wallbox Zielstrom"
        unique_id: wallbox_zielstrom_a
        unit_of_measurement: A
        device_class: current
        state: >
          {% set p = states('sensor.wallbox_pv_rohleistung') | float(0) %}
          {% set p = [0, p] | max %}
          {% set u = states('input_number.wallbox_spannung_effektiv') | float(230) %}
          {% set ph = 3 if is_state('input_select.wallbox_anschluss','3x230V') else 1 %}
          {% set denom = u * ph %}
          {% set raw = (p / denom) if denom > 0 else 0 %}
          {% if raw < 6 %}
          0
          {% else %}
          {% set mn = states('input_number.wallbox_min_amps') | int(6) %}
          {% set mx = states('input_number.wallbox_max_amps') | int(32) %}
          {% set a = (raw | round(0)) | int %}
          {{ [[mn, a, mx] | sort][1] }}
          {% endif %}

      - name: "Wallbox Netz-Leistung"
        unique_id: wallbox_netz_leistung_kw
        device_class: power
        state_class: measurement
        unit_of_measurement: >
          {% set v = states('sensor.verbrauch_aktuell') | float(0) %}
          {{ 'kW' if (v | abs) >= 1000 else 'W' }}
        state: >
          {% set v = states('sensor.verbrauch_aktuell') | float(0) %}
          {% if (v | abs) >= 1000 %}
            {{ (v / 1000) | round(2) }}
          {% else %}
            {{ v | round(0) }}
          {% endif %}

      - name: "Wallbox Ziel-Ladeleistung"
        unique_id: wallbox_ziel_ladeleistung_kw
        device_class: power
        state_class: measurement
        unit_of_measurement: >
          {% set v = states('sensor.wallbox_pv_rohleistung') | float(0) %}
          {{ 'kW' if (v | abs) >= 1000 else 'W' }}
        state: >
          {% set v = states('sensor.wallbox_pv_rohleistung') | float(0) %}
          {% if (v | abs) >= 1000 %}
            {{ (v / 1000) | round(2) }}
          {% else %}
            {{ v | round(0) }}
          {% endif %}

      - name: "Wallbox Soll-Ladeleistung"
        unique_id: wallbox_gui_soll_kw
        device_class: power
        state_class: measurement
        unit_of_measurement: >
          {% set u = states('input_number.wallbox_spannung_effektiv') | float(230) %}
          {% set ph = 3 if is_state('input_select.wallbox_anschluss','3x230V') else 1 %}
          {% set m = states('sensor.wallbox_wallbox_modus') | float(-1) | int %}
          {% if m == 0 and is_state('input_boolean.wallbox_pv_regelung', 'on') %}
            {% set i = states('sensor.wallbox_zielstrom') | float(0) %}
          {% else %}
            {% set i = states('number.wallbox_wallbox_soll_ladestrom') | float(0) %}
          {% endif %}
          {% set v = i * u * ph %}
          {{ 'kW' if (v | abs) >= 1000 else 'W' }}
        state: >
          {% set u = states('input_number.wallbox_spannung_effektiv') | float(230) %}
          {% set ph = 3 if is_state('input_select.wallbox_anschluss','3x230V') else 1 %}
          {% set m = states('sensor.wallbox_wallbox_modus') | float(-1) | int %}
          {% if m == 0 and is_state('input_boolean.wallbox_pv_regelung', 'on') %}
            {% set i = states('sensor.wallbox_zielstrom') | float(0) %}
          {% else %}
            {% set i = states('number.wallbox_wallbox_soll_ladestrom') | float(0) %}
          {% endif %}
          {% set v = i * u * ph %}
          {% if (v | abs) >= 1000 %}
            {{ (v / 1000) | round(2) }}
          {% else %}
            {{ v | round(0) }}
          {% endif %}

      - name: "Wallbox Ist-Ladeleistung"
        unique_id: wallbox_gui_ist_kw
        device_class: power
        state_class: measurement
        unit_of_measurement: >
          {% set raw = states('sensor.wallbox_wallbox_ladeleistung') %}
          {% set u = states('input_number.wallbox_spannung_effektiv') | float(230) %}
          {% set ph = 3 if is_state('input_select.wallbox_anschluss','3x230V') else 1 %}
          {% if raw not in ['unknown', 'unavailable', 'none', ''] %}
            {% set v = raw | float(0) %}
          {% else %}
            {% set i = states('sensor.wallbox_wallbox_ladestrom') | float(0) %}
            {% set v = i * u * ph %}
          {% endif %}
          {{ 'kW' if (v | abs) >= 1000 else 'W' }}
        state: >
          {% set raw = states('sensor.wallbox_wallbox_ladeleistung') %}
          {% set u = states('input_number.wallbox_spannung_effektiv') | float(230) %}
          {% set ph = 3 if is_state('input_select.wallbox_anschluss','3x230V') else 1 %}
          {% if raw not in ['unknown', 'unavailable', 'none', ''] %}
            {% set v = raw | float(0) %}
          {% else %}
            {% set i = states('sensor.wallbox_wallbox_ladestrom') | float(0) %}
            {% set v = i * u * ph %}
          {% endif %}
          {% if (v | abs) >= 1000 %}
            {{ (v / 1000) | round(2) }}
          {% else %}
            {{ v | round(0) }}
          {% endif %}
