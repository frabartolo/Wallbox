# Wallbox: PV / Netz → Ladeleistung (W) → Zielstrom (A) → ESPHome set_charging_amps_auto
#
# Nullregelung am Netzanschluss (wie „Bezug (+) / Lieferung (-)“ im Zählerdiagramm):
# sensor.verbrauch_aktuell muss derselbe Saldo sein: positiv = Bezug aus dem Netz, negativ = Einspeisung.
# Dann: Soll-Ladeleistung P_soll = max(0, min(P_max, -w)).
#   Einspeisung (w < 0) → P_soll = |w| (Überschuss in Laden umsetzen, gedeckelt mit P_max).
#   Bezug (w > 0) → P_soll = 0 (Laden zurücknehmen, bis der Saldo wieder Richtung 0 geht).
# Die alte Formel „P_Wallbox - w“ mit Shelly am Wallbox-Zweig ist dafür ungeeignet: während des Ladens
# ist p_wb oft ≈ Ladeleistung; zusammen mit w kann das fälschlich hohe Sollwerte ergeben (z. B. dauerhaft hoher Netzbezug).
#
# Anschluss: fest 3×230 V (Drehstrom); Leistung P ≈ 3 · U_phase · I (vereinfacht, I = Außenleiter/Phase).
# Stellgröße ist die Ladeleistung; P_max aus wallbox_max_amps × U × 3.
# Zielstrom aus P_soll: gerundeter Außenleiterstrom, begrenzt auf max_amps. Unter ~0,5 A Rohwert → 0 A (Ruhe).
# input_number wallbox_min_amps bleibt für Hinweise (z. B. EVSE-Mindestleistung-Sensor), nicht als harte Sperre.
# Anzeige-Leistungen: kW (Hauptdashboard); intern sensor.wallbox_pv_rohleistung bleibt in W für die Regel.

input_number:
  wallbox_min_amps:
    name: Wallbox Mindeststrom
    min: 6
    max: 16
    step: 1
    unit_of_measurement: A
    icon: mdi:current-dc
    initial: 6
  wallbox_max_amps:
    name: Wallbox Maximalstrom
    min: 6
    max: 64
    step: 1
    unit_of_measurement: A
    icon: mdi:current-dc
    initial: 32
  wallbox_spannung_effektiv:
    name: Wallbox Spannung pro Phase
    min: 200
    max: 250
    step: 1
    unit_of_measurement: V
    initial: 230

input_boolean:
  wallbox_pv_regelung:
    name: Wallbox PV-Überschussregelung
    icon: mdi:solar-power
    initial: true

sensor:
  - platform: derivative
    source: sensor.zaehler_lieferung_wh
    name: Wallbox Lieferung Leistung
    unique_id: wallbox_lieferung_ableitung_w
    unit_time: h
    round: 0

template:
  - sensor:
      # Intern: Soll-Ladewatt zur Regelung (W)
      - name: "Wallbox PV Rohleistung"
        unique_id: wallbox_pv_rohleistung
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        state: >
          {% set w = states('sensor.verbrauch_aktuell') | float(0) %}
          {% set u = states('input_number.wallbox_spannung_effektiv') | float(230) %}
          {% set ph = 3 %}
          {% set mx = states('input_number.wallbox_max_amps') | int(32) %}
          {% set p_cap = mx * u * ph %}
          {{ max(0, min(p_cap, -w)) }}

      - name: "Wallbox Zielstrom"
        unique_id: wallbox_zielstrom_a
        unit_of_measurement: A
        device_class: current
        state: >
          {% set p = states('sensor.wallbox_pv_rohleistung') | float(0) %}
          {% set p = [0, p] | max %}
          {% set u = states('input_number.wallbox_spannung_effektiv') | float(230) %}
          {% set ph = 3 %}
          {% set denom = u * ph %}
          {% set raw = (p / denom) if denom > 0 else 0 %}
          {% set mx = states('input_number.wallbox_max_amps') | int(32) %}
          {% if raw < 0.5 %}
          0
          {% else %}
          {% set a = (raw | round(0)) | int %}
          {{ [[1, a, mx] | sort][1] }}
          {% endif %}

      - name: "Wallbox Maximal möglich kW"
        unique_id: wallbox_max_moeglich_kw
        unit_of_measurement: kW
        device_class: power
        state_class: measurement
        state: >
          {% set u = states('input_number.wallbox_spannung_effektiv') | float(230) %}
          {% set mx = states('input_number.wallbox_max_amps') | int(32) %}
          {{ (mx * u * 3 / 1000) | round(2) }}

      - name: "Wallbox EVSE Mindestleistung"
        unique_id: wallbox_mindestleistung_w
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        state: >
          {% set u = states('input_number.wallbox_spannung_effektiv') | float(230) %}
          {% set mn = states('input_number.wallbox_min_amps') | int(6) %}
          {{ (mn * u * 3) | round(0) }}

      - name: "Wallbox Netz-Leistung"
        unique_id: wallbox_netz_leistung_kw
        unit_of_measurement: kW
        device_class: power
        state_class: measurement
        state: >
          {{ (states('sensor.verbrauch_aktuell') | float(0) / 1000) | round(3) }}

      - name: "Wallbox Ziel-Ladeleistung"
        unique_id: wallbox_ziel_ladeleistung_kw
        unit_of_measurement: kW
        device_class: power
        state_class: measurement
        state: >
          {{ (states('sensor.wallbox_pv_rohleistung') | float(0) / 1000) | round(3) }}

      - name: "Wallbox Soll-Ladeleistung"
        unique_id: wallbox_gui_soll_kw
        unit_of_measurement: kW
        device_class: power
        state_class: measurement
        state: >
          {% set u = states('input_number.wallbox_spannung_effektiv') | float(230) %}
          {% set ph = 3 %}
          {% set mod = states('select.wallbox_modus') %}
          {% set m = 0 if mod == 'Automatik (nur Überschussladen)' else 1 if mod == 'Maximal Laden jetzt' else 3 if mod == 'Manuelles Laden (Einstellungen)' else -1 %}
          {% if m == 0 and is_state('input_boolean.wallbox_pv_regelung', 'on') %}
            {% set i = states('sensor.wallbox_zielstrom') | float(0) %}
            {{ ((i * u * ph) / 1000) | round(3) }}
          {% else %}
            {{ states('number.wallbox_eingestellte_ladeleistung_kw') | float(0) | round(3) }}
          {% endif %}

      - name: "Wallbox Ist-Ladeleistung"
        unique_id: wallbox_gui_ist_kw
        unit_of_measurement: kW
        device_class: power
        state_class: measurement
        state: >
          {% set raw = states('sensor.wallbox_wallbox_ladeleistung') %}
          {% set u = states('input_number.wallbox_spannung_effektiv') | float(230) %}
          {% set ph = 3 %}
          {% if raw not in ['unknown', 'unavailable', 'none', ''] %}
            {{ (raw | float(0) / 1000) | round(3) }}
          {% else %}
            {% set raw2 = states('sensor.wallbox_ladeleistung') %}
            {% if raw2 not in ['unknown', 'unavailable', 'none', ''] %}
              {{ (raw2 | float(0) / 1000) | round(3) }}
            {% else %}
              {% set i = states('sensor.wallbox_wallbox_ladestrom') | float(0) %}
              {{ ((i * u * ph) / 1000) | round(3) }}
            {% endif %}
          {% endif %}
