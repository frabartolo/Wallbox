# Wallbox: PV-Überschuss → Ladestrom (ESPHome-Service set_charging_amps_auto)
#
# Liegt unterhalb der configuration.yaml, z. B. /config/packages/wallbox.yaml
# Voraussetzung in configuration.yaml:
#   homeassistant:
#     packages: !include_dir_named packages/
#   automation: !include_dir_merge_list automations/
# Die Automation „Überschuss an ESPHome“ liegt in automations/wallbox.yaml.
#
# Messgröße für die Regelung: sensor.verbrauch_aktuell (MQTT „Verbrauch Aktuell“, OBIS 16.7.0).
# Wirkleistung am Netzanschluss: positiv = Bezug aus dem Netz → Ladeleistung senken;
# negativ = Einspeisung → verfügbarer Überschuss für die Wallbox als max(0, −W).
# „Zaehler Lieferung Wh“ ist ein Energiezählerstand (Wh), keine Momentanleistung – daraus
# wird optional sensor.wallbox_lieferung_leistung (Ableitung, W) berechnet, nur zur Einordnung.

input_number:
  wallbox_min_amps:
    name: Wallbox Mindeststrom
    min: 6
    max: 16
    step: 1
    unit_of_measurement: A
    icon: mdi:current-dc
    initial: 6
  wallbox_max_amps:
    name: Wallbox Maximalstrom
    min: 6
    max: 64
    step: 1
    unit_of_measurement: A
    icon: mdi:current-dc
    initial: 32
  wallbox_spannung_effektiv:
    name: Wallbox Spannung pro Phase
    min: 200
    max: 250
    step: 1
    unit_of_measurement: V
    initial: 230

input_select:
  wallbox_anschluss:
    name: Wallbox Anschluss
    icon: mdi:transmission-tower
    options:
      - "1x230V"
      - "3x230V"
    initial: "1x230V"

sensor:
  - platform: derivative
    source: sensor.zaehler_lieferung_wh
    name: Wallbox Lieferung Leistung
    unique_id: wallbox_lieferung_ableitung_w
    unit_time: h
    round: 0

template:
  - sensor:
      # Nutzt 16.7.0-Leistung (sensor.verbrauch_aktuell), nicht die unique_id aus MQTT.
      - name: "Wallbox PV Rohleistung"
        unique_id: wallbox_pv_rohleistung
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        state: >
          {% set w = states('sensor.verbrauch_aktuell') | float(0) %}
          {{ max(0, -w) }}

      - name: "Wallbox Zielstrom"
        unique_id: wallbox_zielstrom_a
        unit_of_measurement: A
        device_class: current
        state: >
          {% set p = states('sensor.wallbox_pv_rohleistung') | float(0) %}
          {% set p = [0, p] | max %}
          {% set u = states('input_number.wallbox_spannung_effektiv') | float(230) %}
          {% set ph = 3 if is_state('input_select.wallbox_anschluss','3x230V') else 1 %}
          {% set denom = u * ph %}
          {% set raw = (p / denom) if denom > 0 else 0 %}
          {% set mn = states('input_number.wallbox_min_amps') | int(6) %}
          {% set mx = states('input_number.wallbox_max_amps') | int(32) %}
          {% set a = (raw | round(0)) | int %}
          {{ [[mn, a, mx] | sort][1] }}
