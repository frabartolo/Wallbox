# Wallbox: PV-Überschuss → Ladestrom (ESPHome-Service set_charging_amps_auto)
#
# Nach /config/packages/wallbox.yaml kopieren.
# Voraussetzung: configuration.yaml enthält:
#   homeassistant:
#     packages: !include_dir_named packages/
#
# Überschuss: grob Solar-Leistung minus Hausverbrauch (Volkszähler/MQTT).
# Entity-IDs unter Entwicklerwerkzeuge → Zustände prüfen und bei Bedarf anpassen.

input_number:
  wallbox_min_amps:
    name: Wallbox Mindeststrom
    min: 6
    max: 16
    step: 1
    unit_of_measurement: A
    icon: mdi:current-dc
    initial: 6
  wallbox_max_amps:
    name: Wallbox Maximalstrom
    min: 6
    max: 64
    step: 1
    unit_of_measurement: A
    icon: mdi:current-dc
    initial: 32
  wallbox_spannung_effektiv:
    name: Wallbox Spannung pro Phase
    min: 200
    max: 250
    step: 1
    unit_of_measurement: V
    initial: 230

input_select:
  wallbox_anschluss:
    name: Wallbox Anschluss
    icon: mdi:transmission-tower
    options:
      - "1x230V"
      - "3x230V"
    initial: "1x230V"

template:
  - sensor:
      # Volkszähler: Solar aktuell − Verbrauch aktuell (nur wenn >= 0).
      # Typische IDs aus den Namen – bitte in HA gegenprüfen:
      #   "Solaranlage Erzeugung aktuell" → sensor.solaranlage_erzeugung_aktuell
      #   "Verbrauch Aktuell"             → sensor.verbrauch_aktuell
      # Alternative: direkt sensor.lieferung_aktuell (Netzeinspeisung), falls der Wert besser passt.
      - name: "Wallbox PV Rohleistung"
        unique_id: wallbox_pv_rohleistung
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        state: >
          {% set solar = states('sensor.solaranlage_erzeugung_aktuell') | float(0) %}
          {% set verb = states('sensor.verbrauch_aktuell') | float(0) %}
          {{ max(0, solar - verb) }}

      - name: "Wallbox Zielstrom"
        unique_id: wallbox_zielstrom_a
        unit_of_measurement: A
        device_class: current
        state: >
          {% set p = states('sensor.wallbox_pv_rohleistung') | float(0) %}
          {% set p = [0, p] | max %}
          {% set u = states('input_number.wallbox_spannung_effektiv') | float(230) %}
          {% set ph = 3 if is_state('input_select.wallbox_anschluss','3x230V') else 1 %}
          {% set denom = u * ph %}
          {% set raw = (p / denom) if denom > 0 else 0 %}
          {% set mn = states('input_number.wallbox_min_amps') | int(6) %}
          {% set mx = states('input_number.wallbox_max_amps') | int(32) %}
          {% set a = (raw | round(0)) | int %}
          {{ [[mn, a, mx] | sort][1] }}

automation:
  - id: wallbox_ueberschuss_nach_esphome
    alias: "Wallbox: Überschuss an ESPHome (Automatik)"
    description: Setzt den Ladestrom nur im ESP-Modus Automatik (Sensor = 0).
    mode: restart
    trigger:
      - platform: time_pattern
        seconds: /15
      - platform: state
        entity_id:
          - sensor.wallbox_zielstrom
          - sensor.wallbox_wallbox_modus
    condition:
      - condition: template
        value_template: "{{ states('sensor.wallbox_wallbox_modus') | float(-1) | int == 0 }}"
    action:
      - service: esphome.wallbox_set_charging_amps_auto
        data:
          amps: "{{ states('sensor.wallbox_zielstrom') | int(6) }}"
