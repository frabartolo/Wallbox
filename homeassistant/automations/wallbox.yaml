# Wallbox: PV-Überschuss → ESPHome (siehe packages/wallbox.yaml für Sensoren/Hilfsgrößen).
# Einbindung in configuration.yaml: automation: !include_dir_merge_list automations/

- id: wallbox_ueberschuss_nach_esphome
  alias: "Wallbox: Überschuss an ESPHome (Automatik)"
  description: Setzt den Ladestrom nur im ESP-Modus Automatik (Sensor = 0).
  mode: restart
  trigger:
    - platform: time_pattern
      seconds: /15
    - platform: state
      entity_id:
        - sensor.wallbox_zielstrom
        - sensor.wallbox_wallbox_modus
        - sensor.16-7-0-VerbrauchAktuellW
  condition:
    - condition: template
      value_template: "{{ states('sensor.wallbox_wallbox_modus') | float(-1) | int == 0 }}"
  action:
    - service: esphome.wallbox_set_charging_amps_auto
      data:
        amps: "{{ states('sensor.wallbox_zielstrom') | int(6) }}"
