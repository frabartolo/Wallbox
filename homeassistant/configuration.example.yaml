# Beispiel für die zentrale /config/configuration.yaml
# ------------------------------------------------------------------
# Inhalt aus deiner bisherigen Datei übernehmen und alles, was jetzt unter
# packages/ liegt (MQTT, Wallbox, EOS), aus dieser Datei ENTFERNEN.
#
# Pflicht: genau ein Block homeassistant: mit packages – siehe unten.
# ------------------------------------------------------------------

default_config:

homeassistant:
  packages: !include_dir_named packages/

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

tts:
  - platform: google_translate

# Mehrere YAML-Dateien unter automations/ zu einer Liste zusammenführen (statt einer einzelnen automations.yaml).
automation: !include_dir_merge_list automations/
script: !include scripts.yaml
scene: !include scenes.yaml

# Eigenes Dashboard „Wallbox“ (Datei dashboards/wallbox.yaml ins Konfigurationsverzeichnis legen).
# Wenn du bereits einen lovelace:-Block hast: nur dashboards: wallbox: … einfügen, nicht doppeln.
# In der Seitenleiste: Einstellungen → Dashboards → Reihenfolge anpassen („Wallbox“ nach oben).
lovelace:
  dashboards:
    wallbox:
      mode: yaml
      title: Wallbox
      icon: mdi:ev-station
      filename: dashboards/wallbox.yaml

bluetooth:
