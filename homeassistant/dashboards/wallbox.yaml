# Dashboard „Wallbox“ – nach /config/dashboards/wallbox.yaml kopieren.
# Entity-IDs: bei doppeltem „wallbox_“-Präfix in HA anpassen (Geräteansicht).
# ESPHome: select/number/sensor heißen z. B. select.wallbox_modus, number.wallbox_eingestellte_ladeleistung_kw

title: Wallbox
views:
  - title: Übersicht
    path: main
    icon: mdi:ev-station
    cards:
      - type: markdown
        title: Bedeutung der Werte
        content: >
          | Name | Bedeutung |

          |:-----|:----------|

          | **Modus** | **Automatik:** nur Überschussladen über Home Assistant.
          **Manuell:** Soll‑Leistung am Slider setzen. **Maximal:** volle
          Leistung bis EVSE‑Maximum. |

          | **Aktuelle Ladeleistung kW** | Momentan gemessene Scheinleistung am
          Wallbox‑Anschluss (Shelly → ESP). |

          | **Eingestellte Ladeleistung kW** | Soll‑Leistung: in Automatik vom
          Regler übernommen; im manuellen Modus am Slider einstellbar (ESP ca.
          6–22 kW). |

          | **Maximal Laden** | Hier: *Maximalstrom* in **Ampere**
          (`input_number.wallbox_max_amps`) – derselbe Wert steht unten bei
          *Grenzen & Spannung*. Leistungsobergrenze ≈ Max-A × Spannung × 3. |

          | **Wallbox Soll-Ladestrom (A)** | Sollstrom am Poti/EVSE; entspricht
          der eingestellten Leistung (kW ÷ Spannung ÷ 3). |
      - type: entities
        title: Wallbox (Steuerung & Rückmeldung ESP ↔ HA)
        show_header_toggle: false
        entities:
          - entity: select.wallbox_modus
            name: Modus
          - entity: sensor.wallbox_aktuelle_ladeleistung_kw
            name: Aktuelle Ladeleistung kW
          - entity: number.wallbox_eingestellte_ladeleistung_kw
            name: Eingestellte Ladeleistung kW
          - entity: input_number.wallbox_max_amps
            name: Maximal Laden
          - entity: sensor.wallbox_wallbox_ladestrom
            name: Wallbox Soll-Ladestrom
      - type: entities
        title: PV-Überschussregelung (Home Assistant)
        show_header_toggle: false
        entities:
          - entity: input_boolean.wallbox_pv_regelung
            name: Regelung aktiv
          - entity: sensor.wallbox_netz_leistung
            name: Netz-Saldo (kW, vzlogger; + oft Bezug, − Einspeisung)
          - entity: sensor.wallbox_pv_rohleistung
            name: Roh-Soll Leistung vor Mindeststrom (W)
          - entity: sensor.wallbox_ziel_ladeleistung
            name: Ziel-Ladeleistung (Regler)
          - entity: sensor.wallbox_soll_ladeleistung
            name: Soll-Ladeleistung (Anzeige)
          - entity: sensor.wallbox_ist_ladeleistung
            name: Ist-Ladeleistung (Anzeige)
          - entity: sensor.wallbox_evse_mindestleistung
            name: Mindestleistung EVSE (ca.)
      - type: entities
        title: Grenzen & Spannung
        show_header_toggle: false
        entities:
          - entity: input_number.wallbox_min_amps
          - entity: input_number.wallbox_max_amps
          - entity: input_number.wallbox_spannung_effektiv
      - type: entities
        title: Technik (Debug)
        show_header_toggle: false
        entities:
          - entity: sensor.wallbox_zielstrom
            name: Zielstrom Regler (A)
          - entity: sensor.wallbox_pv_rohleistung
            name: PV-Rohleistung Soll (W)
          - type: divider
          - entity: sensor.wallbox_ist_ladeleistung
            name: Ist-Ladeleistung kW (Shelly/ESP, HA-Anzeige)
