# Dashboard „Wallbox“ – nach /config/dashboards/wallbox.yaml kopieren und in configuration.yaml
# unter lovelace: dashboards: … einbinden (siehe configuration.example.yaml).
#
# „Entität nicht gefunden“: Entwicklerwerkzeuge → Zustände → nach „wallbox“ suchen und
# die hier eingetragenen entity_id-Zeilen anpassen. ESPHome: oft wallbox_wallbox_* oder nur wallbox_*.
# MQTT: sensor.verbrauch_aktuell aus packages/mqtt_volkszaehler.yaml (Integration muss laufen).

title: Wallbox
views:
  - title: Übersicht
    path: main
    icon: mdi:ev-station
    cards:
      - type: entities
        title: PV-Überschussregelung (Home Assistant)
        show_header_toggle: false
        entities:
          - entity: input_boolean.wallbox_pv_regelung
            name: Regelung aktiv
          - entity: sensor.wallbox_netz_leistung
            name: Netz-Leistung (Soll 0 W)
          - entity: sensor.wallbox_ziel_ladeleistung
            name: Ziel-Ladeleistung (Regler)
          - entity: sensor.wallbox_soll_ladeleistung
            name: Soll-Ladeleistung
          - entity: sensor.wallbox_ist_ladeleistung
            name: Ist-Ladeleistung
          - entity: input_number.wallbox_min_amps
          - entity: input_number.wallbox_max_amps
          - entity: input_number.wallbox_spannung_effektiv
          - entity: input_select.wallbox_anschluss
      - type: entities
        title: Technik (A / W für ESP)
        show_header_toggle: false
        entities:
          - entity: sensor.wallbox_zielstrom
          - entity: sensor.wallbox_pv_rohleistung
      - type: entities
        title: Wallbox-Gerät (ESPHome)
        show_header_toggle: false
        entities:
          - entity: sensor.wallbox_wallbox_modus
            name: Modus (0=Automatik)
          - entity: number.wallbox_wallbox_soll_ladestrom
            name: Soll-Ladestrom (ESP, A)
          - entity: sensor.wallbox_wallbox_ladestrom
            name: Ladestrom (ESP, A)
          - entity: sensor.wallbox_wallbox_ladeleistung
            name: Ladeleistung Roh (Shelly)
          - type: divider
          - entity: button.wallbox_wallbox_automatikmodus
          - entity: button.wallbox_wallbox_maximal_laden_jetzt
          - entity: button.wallbox_wallbox_nur_uberschussladen
